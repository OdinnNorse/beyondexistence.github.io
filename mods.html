<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond Existence – Mod List</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="list.css">
</head>
<body>

    <nav class="navbar">
        <a class="navbar-brand" href="index.html">Beyond <span>Existence</span></a>
        <ul class="navbar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="mods.html" class="active">Mod List</a></li>
            <li><a href="balancing.html">Balancing Changes</a></li>
        </ul>
    </nav>

    <div class="page-hero">
        <h1>Mod List</h1>
        <p>Every mod in the pack &middot; categorized</p>
    </div>

    <div class="container" id="container">
        <div class="stat-card" id="stat-card">
            <h2>Loading<span id="total-count"></span></h2>
        </div>
    </div>

    <script>
        fetch('mods.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('container');
                const statCard = document.getElementById('stat-card');
                let total = 0;

                for (const [category, mods] of Object.entries(data)) {
                    total += mods.length;

                    const card = document.createElement('div');
                    card.className = 'category-card';

                    const heading = document.createElement('h2');
                    heading.innerHTML = `${category} <span class="mod-count">${mods.length}</span>`;
                    card.appendChild(heading);

                    const ul = document.createElement('ul');
                    for (const mod of mods) {
                        const li = document.createElement('li');
                        li.textContent = mod;
                        ul.appendChild(li);
                    }
                    card.appendChild(ul);

                    container.insertBefore(card, statCard);
                }

                statCard.querySelector('h2').innerHTML = `Total Mods <span>${total}</span>`;
            })
            .catch(() => {
                document.getElementById('stat-card').querySelector('h2').textContent = 'Failed to load mods.json';
            });
    </script>

</body>
</html>
